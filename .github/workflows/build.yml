# .github/workflows/build.yml
name: Build Vite Project

on:
    push:
        # 当代码推送到 main 分支时触发
        branches:
            - main
            - master
    pull_request:
        # 当有 PR 请求时触发
        branches:
            - main
            - master
    workflow_dispatch: # 允许手动触发工作流


jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # 1. 检出代码
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. 设置 Node.js 环境
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            # 3. 安装依赖 (使用 npm ci 进行更快、更可靠的安装)    
            - name: Install dependencies
              run: npm ci
              
            # 4. 构建项目
            - name: Build project
              run: npm run build  # 执行 package.json 中的 build 脚本


            # 5 创建压缩包
            - name: Create ZIP package
              run: |
                ZIP_NAME="3d-index-app.zip"
                echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
                if [ -d "dist" ]; then
                    cd dist
                    zip -r ../$ZIP_NAME .
                    cd ..
                    echo "✅ ZIP created successfully!"
                    ls -la $ZIP_NAME
                else
                    echo "❌ ERROR: dist/ directory not found!"
                    exit 1
                fi
            
            # 6. 上传构建产物（ZIP 文件）作为工作流的输出    
            - name: Upload zip artidact
              uses: actions/upload-artifact@v4
              with:
                  name: 3d-index                # Artifact 的名称（在 Actions 页面显示）
                  path: ${{ env.ZIP_NAME }}     # 要上传的文件路径
                  if-no-files-found: error      # 如果文件不存在则报错，防止静默失败
                  retention-days: 30            # 指定保留天数（默认90天）
             